<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <title>Tap Dash Arena</title>
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <div id="app">
      <header class="top card">
        <div>
          <h1>⚡ Tap Dash Arena</h1>
          <p class="muted">Arcade mobile-first · premium cosmetic economy</p>
        </div>
        <button id="premiumBtn" class="cta">Unlock Premium ($0.99)</button>
      </header>

      <section class="card stats">
        <div><span class="label">Player</span><strong id="playerLabel">Guest</strong></div>
        <div><span class="label">Coins</span><strong id="coinLabel">0</strong></div>
        <div><span class="label">Best</span><strong id="bestLabel">0</strong></div>
        <div><span class="label">Streak</span><strong id="streakLabel">0🔥</strong></div>
      </section>

      <section class="card identity">
        <input id="playerInput" maxlength="20" placeholder="Your name" />
        <button id="savePlayerBtn">Save</button>
        <button id="muteBtn">🔊</button>
      </section>

      <section class="card game">
        <div class="game-head">
          <h2>45s Survival</h2>
          <button id="startBtn">Start Run</button>
        </div>
        <div class="hud">
          <span>Time <b id="timeLabel">45</b></span>
          <span>Score <b id="scoreLabel">0</b></span>
          <span>Combo <b id="comboLabel">x1</b></span>
          <span>Miss <b id="missLabel">0</b>/5</span>
        </div>
        <div class="combo-banner" id="comboBanner"></div>
        <div id="arena" class="arena"></div>
      </section>

      <section class="card missions">
        <h3>Daily Missions</h3>
        <ul id="missionList"></ul>
      </section>

      <section class="card shop">
        <h3>Skin Shop</h3>
        <div id="skinList" class="skin-list"></div>
      </section>

      <section class="card leaderboard">
        <h3>Top Local Ranking</h3>
        <ol id="rankList"></ol>
      </section>
    </div>

    <div id="resultModal" class="modal hidden">
      <div class="modal-card">
        <h2 id="gradeText">A</h2>
        <p id="resultScore">Score 0</p>
        <p id="resultCoins">+0 coins</p>
        <button id="retryBtn" class="cta">Play Again</button>
      </div>
    </div>

    <script src="app.js"></script>
  </body>
</html>
